# vmlab web UI stack.
#
#   docker compose up --build      # build + serve the web UI on :7878
#
# Open http://localhost:7878 — by default there is no login and the lab in
# ./docker/lab is brought up automatically, so it is already running when the UI
# loads. Set VMLAB_WEB_UP=0 to leave it stopped instead — the UI lists it and
# you start it with the "up" button. To require a login (recommended before
# exposing this beyond your machine), set VMLAB_WEB_USER and VMLAB_WEB_PASSWORD
# (e.g. in a .env file or your shell). Put your lab's vmlab.wcl in ./docker/lab
# (a sample is shipped).
services:
  vmlab-web:
    build:
      context: .
      dockerfile: Containerfile
    image: vmlab:latest
    ports:
      - "7878:7878"
    # KVM acceleration. Drop this line to run under TCG emulation (much slower).
    devices:
      - "/dev/kvm:/dev/kvm"
    # VMLAB_WEB_UP=0 leaves the lab stopped (start it from the UI). To require a
    # login, set both VMLAB_WEB_USER and VMLAB_WEB_PASSWORD (supplied credentials
    # take precedence over the image's --no-auth default):
    environment:
      VMLAB_WEB_UP: "0"
    #     VMLAB_WEB_USER: "${VMLAB_WEB_USER:?set a username}"
    #     VMLAB_WEB_PASSWORD: "${VMLAB_WEB_PASSWORD:?set a password}"
    volumes:
      # Your lab directory — edit ./docker/lab/vmlab.wcl on the host.
      - ./docker/lab:/lab
      # Persistent template store (templates are pulled on first `up`).
      - vmlab-templates:/root/.local/share/vmlab/templates
      # Lab working data (disk clones, built media, lab state). Kept on a
      # container-native volume rather than the ./docker/lab bind mount so the
      # heavy disk I/O stays fast — this matters a lot on Windows, where bind
      # mounts go over a slow virtiofs/9p bridge (issue #2). Matches the image's
      # VMLAB_WORK_DIR default.
      - vmlab-work:/var/lib/vmlab/work
    restart: unless-stopped

volumes:
  vmlab-templates:
  vmlab-work:
