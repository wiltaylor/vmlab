name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # vmlab's tests probe the host for the tools it drives — QEMU emulators +
      # firmware (x86 OVMF, aarch64 AAVMF, riscv EDK2), swtpm, the ISO/floppy
      # builders (xorriso/mtools), the SMB server, and tesseract for OCR — so
      # install them (mirrors the Containerfile runtime deps).
      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-system-arm qemu-system-misc qemu-utils \
            ovmf seabios swtpm \
            qemu-efi-aarch64 qemu-efi-riscv64 \
            tesseract-ocr passt \
            xorriso mtools dosfstools samba
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      # `just check` lints --all-features, which compiles vmlab-web; rust-embed
      # needs web-ui/dist present at compile time, so build the frontend first.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build web UI
        run: |
          cd web-ui
          npm ci
          npm run build
      - run: just check

  # ── Version ───────────────────────────────────────────────────────────────
  # Trailer-gated: a release only happens when HEAD carries a publish trailer.
  #   pre-release: true   → X.Y.Z-alpha, marked as a GitHub pre-release
  #   release: true       → X.Y.Z stable
  # Neither → CI runs tests only. The version is bumped from the last v* tag,
  # scanning conventional-commit subjects since that tag for the bump level
  # (0.x semantics: a breaking change bumps the minor, not the major).
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.calc.outputs.version }}
      prerelease: ${{ steps.calc.outputs.prerelease }}
      do_release: ${{ steps.calc.outputs.do_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: calc
        run: |
          IS_RELEASE=$(git log -1 --format='%(trailers:key=release,valueonly)')
          IS_PRERELEASE=$(git log -1 --format='%(trailers:key=pre-release,valueonly)')

          if [[ "$IS_RELEASE" != "true" && "$IS_PRERELEASE" != "true" ]]; then
            echo "do_release=false" >> "$GITHUB_OUTPUT"
            echo "No release/pre-release trailer on HEAD — tests only." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Next version = bump from the last v* tag, scanning conventional
          # commits since that tag for the bump level (0.x: major -> minor).
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            PREV_MAJOR=0; PREV_MINOR=0; PREV_PATCH=0; RANGE="HEAD"
          else
            VER="${LAST_TAG#v}"; VER="${VER%%-*}"
            IFS='.' read -r PREV_MAJOR PREV_MINOR PREV_PATCH <<< "$VER"
            RANGE="${LAST_TAG}..HEAD"
          fi

          BUMP="none"
          while IFS= read -r HASH; do
            SUBJECT=$(git log -1 --format='%s' "$HASH")
            BODY=$(git log -1 --format='%b' "$HASH")
            if echo "$SUBJECT" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$BODY" | grep -qiE '^BREAKING[ -]CHANGE:'; then
              BUMP="major"
            elif echo "$SUBJECT" | grep -qE '^feat(\(.+\))?:' && [[ "$BUMP" != "major" ]]; then
              BUMP="minor"
            elif echo "$SUBJECT" | grep -qE '^(fix|perf|refactor|build|ci|docs|style|test|chore|revert)(\(.+\))?:' && [[ "$BUMP" == "none" ]]; then
              BUMP="patch"
            fi
          done < <(git log --format='%H' $RANGE)
          [[ "$BUMP" == "none" ]] && BUMP="patch"

          case "$BUMP" in
            major)
              if [[ "$PREV_MAJOR" -eq 0 ]]; then MAJOR=0; MINOR=$((PREV_MINOR + 1)); PATCH=0
              else MAJOR=$((PREV_MAJOR + 1)); MINOR=0; PATCH=0; fi ;;
            minor) MAJOR=$PREV_MAJOR; MINOR=$((PREV_MINOR + 1)); PATCH=0 ;;
            patch) MAJOR=$PREV_MAJOR; MINOR=$PREV_MINOR; PATCH=$((PREV_PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          PRERELEASE=false
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            VERSION="${VERSION}-alpha"
            PRERELEASE=true
          fi

          echo "Calculated version: $VERSION (bump=$BUMP, prerelease=$PRERELEASE, from ${LAST_TAG:-none})"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "do_release=true" >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## Release

          | | |
          |---|---|
          | **Version** | \`$VERSION\` |
          | **Bump** | $BUMP |
          | **Pre-release** | $PRERELEASE |
          | **Previous tag** | \`${LAST_TAG:-none}\` |
          SUMMARY

  # ── Binary ────────────────────────────────────────────────────────────────
  # Build the version-stamped `vmlab` CLI and the `vmlab-web` UI server for
  # Linux x86_64 (vmlab drives QEMU/KVM, so Linux is the only target). Both are
  # uploaded for the release job.
  build:
    name: Build vmlab (${{ matrix.target }})
    needs: [version, check]
    if: needs.version.outputs.do_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}
      - name: Stamp version
        run: |
          V="${{ needs.version.outputs.version }}"
          sed -i '0,/^version = ".*"$/s//version = "'"$V"'"/' Cargo.toml
      - name: Build CLI
        run: cargo build --bin vmlab --release --target ${{ matrix.target }}
      # The web UI is embedded into vmlab-web (rust-embed), so build it first.
      - name: Build web UI
        run: |
          cd web-ui
          npm ci
          npm run build
      - name: Build web server
        run: cargo build --bin vmlab-web --features web --release --target ${{ matrix.target }}
      - name: Stage assets
        run: |
          V="${{ needs.version.outputs.version }}"
          cp "target/${{ matrix.target }}/release/vmlab" "vmlab-$V-${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/vmlab-web" "vmlab-web-$V-${{ matrix.suffix }}"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          # Matches both vmlab-<v>-<suffix> and vmlab-web-<v>-<suffix>.
          path: vmlab-*-${{ matrix.suffix }}
          retention-days: 1

  # ── Release ───────────────────────────────────────────────────────────────
  # Tag the commit and cut a GitHub (pre-)release with the binary attached.
  release:
    name: Create GitHub release
    needs: [version, build]
    if: needs.version.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Tag
        run: |
          V="${{ needs.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$V"
          git push origin "v$V"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          generate_release_notes: true
          files: dist/**/*
